# Trigger a Render deploy manually via Deploy Hook (no CLI, no workspace needed).
# To run: GitHub Actions tab -> Render Deploy -> Run workflow
#
# Secret required: RENDER_DEPLOY_HOOK_URL
# Get it: Render Dashboard -> school-erp -> Settings -> Deploy Hook -> Copy URL
name: Render Deploy
run-name: Deploy via Render Hook
on:
  workflow_dispatch:
jobs:
  Deploy-Render:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy
        run: |
          curl -sf -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo ""
          echo "Deploy triggered. Check: https://school-erp-51hd.onrender.com"
