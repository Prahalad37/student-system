# Deploy to Render on push to main (via Deploy Hook).
# If Render Dashboard has Auto-Deploy enabled, disable it to avoid double deploys.
#
# Required secret: RENDER_DEPLOY_HOOK_URL
name: Render Deploy on Push
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy
        run: |
          curl -sf -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
